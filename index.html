<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐢 BOT CONTROL PANEL</title>

<style>
body {
margin:0;
background:#000;
color:#ff0000;
font-family: monospace;
overflow-x:hidden;
}

.center {
text-align:center;
margin-top:20px;
}

.title {
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px red;
}

.console {
border:2px solid red;
margin:20px;
padding:15px;
box-shadow:0 0 15px red;
}

.qr {
display:block;
margin:20px auto;
width:250px;
border:3px solid red;
box-shadow:0 0 20px red;
}

.grid {
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:10px;
padding:20px;
}

.box {
border:1px solid red;
padding:10px;
box-shadow:0 0 10px red;
text-align:center;
}

.glow {
animation: glow 1s infinite alternate;
}

@keyframes glow {
from {box-shadow:0 0 5px red;}
to {box-shadow:0 0 20px red;}
}

.admin {
margin:20px;
padding:15px;
border:2px solid red;
display:none;
}

input {
background:black;
color:red;
border:1px solid red;
padding:10px;
width:80%;
}

button {
background:red;
color:black;
padding:10px;
border:none;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="center">
<div class="title">🐢 𝕬𝖓𝖎𝖒𝖊 𝕸𝕯5</div>
</div>

<!-- CONSOLE -->
<div class="console glow">
⛔ SYSTEM STATUS: <span id="status">𝕷𝖔𝖆𝖉𝖎𝖓𝖌</span><br>
⌛ 𝖂𝖆𝖎𝖙𝖎𝖓𝖌 𝖋𝖔𝖗 𝖈𝖔𝖒𝖒𝖆𝖓𝖉
</div>

<!-- QR -->
<img id="qr" class="qr" />

<!-- PANELS -->
<div class="grid">

<div class="box">
<h3>👤 𝕺𝖓𝖑𝖎𝖓𝖊 𝖚𝖘𝖊𝖗𝖘</h3>
<p id="users">24</p>
</div>

<div class="box">
<h3>📡 𝕻𝖆𝖎𝖗𝖊𝖉 𝕾𝖊𝖘𝖘𝖎𝖔𝖓𝖘</h3>
<p id="sessions">38</p>
</div>

<div class="box">
<h3>📷 QR Generated</h3>
<p id="qrCount">39</p>
</div>

</div>

<!-- ADMIN LOGIN -->
<div class="center">
<button onclick="showAdmin()">🔐 Admin Panel</button>
</div>

<div class="admin" id="admin">

<h2>🔐 𝕬𝖉𝖒𝖎𝖓 𝕯𝖆𝖘𝖍𝖇𝖔𝖆𝖗𝖉</h2>

<input type="password" id="pass" placeholder="Enter Password"/>
<br>
<button onclick="login()">𝕷𝖔𝖌𝖎𝖓</button>

<div id="panel" style="display:none; margin-top:20px;">

<h3>⚙ 𝕮𝖔𝖓𝖙𝖗𝖔𝖑 𝕻𝖆𝖓𝖓𝖊𝖑</h3>

<button onclick="restartBot()">🔄 𝕽𝖊𝖘𝖙𝖆𝖗𝖙 𝕭𝖔𝖙</button>
<button onclick="deleteSessions()">🗑 𝕯𝖊𝖑𝖊𝖙𝖊 𝖆𝖑𝖑 𝖘𝖊𝖘𝖘𝖎𝖔𝖓𝖘</button>
<button onclick="stopBot()">⛔ 𝕾𝖙𝖔𝖕 𝖇𝖔𝖙</button>

</div>

</div>

<script>

const API = "https://whatsap-bot-production.up.railway.app"

let qrCount = 0

async function load(){

try {

const res = await fetch(API + "/qr")
const data = await res.json()

document.getElementById("status").innerText = data.status

if(data.qr){
document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?data=" +
encodeURIComponent(data.qr)

qrCount++
document.getElementById("qrCount").innerText = qrCount
}

} catch(e){
document.getElementById("status").innerText = "OFFLINE"
}

}

setInterval(load, 3000)
load()

function showAdmin(){
document.getElementById("admin").style.display = "block"
}

function login(){
const pass = document.getElementById("pass").value

if(pass === "Qwerty12345"){
document.getElementById("panel").style.display = "block"
alert("ACCESS GRANTED")
}else{
alert("WRONG PASSWORD")
}
}

/*
⚠️ These need backend endpoints in Railway
*/

async function restartBot(){
await fetch(API + "/restart", {method:"POST"})
alert("Bot restarting...")
}

function deleteSessions(){
alert("You must implement /delete-sessions in backend")
}

function stopBot(){
alert("You must implement stop logic in backend")
}

</script>

</body>
</html>
