<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOT QR PANEL</title>

<style>
body {
margin:0;
background:black;
color:red;
font-family: "Courier New", monospace;
text-align:center;
}

.title {
font-size:28px;
margin-top:20px;
font-weight:bold;
text-shadow:0 0 10px red;
}

.gothic {
font-family: "Arial", sans-serif;
font-weight:bold;
letter-spacing:2px;
}

.card {
border:2px solid red;
margin:20px;
padding:15px;
box-shadow:0 0 15px red;
}

input {
width:80%;
padding:10px;
background:black;
color:red;
border:1px solid red;
margin-top:10px;
}

button {
background:red;
color:black;
padding:10px;
border:none;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

img {
width:250px;
margin-top:20px;
border:3px solid red;
box-shadow:0 0 20px red;
}

.console {
margin:20px;
padding:10px;
border:1px solid red;
text-align:left;
height:120px;
overflow:auto;
box-shadow:0 0 10px red;
}
</style>
</head>

<body>

<div class="title gothic">𝖇𝖔𝖙 𝖖𝖗 𝖈𝖔𝖓𝖘𝖔𝖑𝖊</div>

<div class="card">
<h3>📱 ENTER NUMBER (OPTIONAL)</h3>

<input id="num" placeholder="e.g 2348012345678"/>
<br>
<button onclick="generate()">GENERATE QR</button>
</div>

<div class="card">
<h3>📡 LIVE QR CODE</h3>
<img id="qr" />
<p id="status">Waiting...</p>
</div>

<div class="card">
<h3>⚡ SYSTEM CONSOLE</h3>
<div class="console" id="log">
> System ready...
</div>
</div>

<script>

const API = "https://whatsap-bot-production.up.railway.app"

function log(msg){
document.getElementById("log").innerHTML += "<br>> " + msg
}

async function generate(){

const num = document.getElementById("num").value

log("Requesting QR...")

try {

const res = await fetch(API + "/qr")
const data = await res.json()

if(data.qr){

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?data=" +
encodeURIComponent(data.qr)

document.getElementById("status").innerText =
data.status || "SCAN QR"

log("QR loaded successfully")

} else {
log("No QR available")
}

} catch(e){
log("Error connecting to server")
}

}

/*
AUTO REFRESH QR
*/
setInterval(generate, 5000)

generate()

</script>

</body>
</html>
